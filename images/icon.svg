<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Orange side gradient -->
    <linearGradient id="orangeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A1F"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>

    <!-- Cream paper gradient (warm sketchbook) -->
    <linearGradient id="paperBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FBF5E3"/>
      <stop offset="100%" stop-color="#EFE5C7"/>
    </linearGradient>

    <!-- Soft shadow cast from orange onto paper along the seam -->
    <linearGradient id="seamShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Rounded-square clip (VS Code icon feel) -->
    <clipPath id="roundClip">
      <rect x="0" y="0" width="256" height="256" rx="48" ry="48"/>
    </clipPath>

    <!-- Left-half clip (code side) — diagonal cut -->
    <clipPath id="leftClip">
      <path d="M0 0 H140 L116 256 H0 Z"/>
    </clipPath>

    <!-- Right-half clip (paper side) — diagonal cut -->
    <clipPath id="rightClip">
      <path d="M140 0 H256 V256 H116 Z"/>
    </clipPath>

    <!-- Paper texture: tiny speckle pattern -->
    <pattern id="paperGrain" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="5"  cy="12" r="0.5" fill="#B8AC86" fill-opacity="0.35"/>
      <circle cx="18" cy="28" r="0.4" fill="#B8AC86" fill-opacity="0.30"/>
      <circle cx="33" cy="6"  r="0.5" fill="#B8AC86" fill-opacity="0.35"/>
      <circle cx="26" cy="16" r="0.3" fill="#B8AC86" fill-opacity="0.25"/>
      <circle cx="11" cy="35" r="0.4" fill="#B8AC86" fill-opacity="0.30"/>
      <circle cx="38" cy="24" r="0.3" fill="#B8AC86" fill-opacity="0.25"/>
    </pattern>
  </defs>

  <g clip-path="url(#roundClip)">

    <!-- ============ LEFT: code side (orange) ============ -->
    <g clip-path="url(#leftClip)">
      <rect x="0" y="0" width="256" height="256" fill="url(#orangeBg)"/>

      <!-- Subtle grid lines -->
      <g stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1">
        <line x1="0" y1="64"  x2="140" y2="64"/>
        <line x1="0" y1="128" x2="140" y2="128"/>
        <line x1="0" y1="192" x2="140" y2="192"/>
      </g>

      <!-- SVG code snippet, stylized as editor text -->
      <g font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace"
         font-weight="700"
         fill="#FFFFFF">
        <text x="22" y="74" font-size="22" fill="#FFF7ED">
          &lt;<tspan fill="#FFFFFF">svg</tspan>&gt;
        </text>

        <text x="34" y="116" font-size="16" fill-opacity="0.95">
          &lt;<tspan fill="#FEF3C7">path</tspan>
        </text>
        <text x="46" y="140" font-size="14" fill="#FFE8D1">
          d=<tspan fill="#FFFFFF">"M12 2…"</tspan>
        </text>
        <text x="46" y="160" font-size="14" fill="#FFE8D1">
          fill=<tspan fill="#FFFFFF">"#F97316"</tspan>/&gt;
        </text>

        <text x="22" y="200" font-size="22" fill="#FFF7ED">
          &lt;/<tspan fill="#FFFFFF">svg</tspan>&gt;
        </text>
      </g>
    </g>

    <!-- ============ RIGHT: cream paper with pencil house ============ -->
    <g clip-path="url(#rightClip)">
      <!-- Paper base -->
      <rect x="0" y="0" width="256" height="256" fill="url(#paperBg)"/>
      <!-- Paper grain -->
      <rect x="0" y="0" width="256" height="256" fill="url(#paperGrain)"/>

      <!-- Faint horizontal ruled lines (sketchbook feel) -->
      <g stroke="#D7C99D" stroke-opacity="0.45" stroke-width="0.6">
        <line x1="120" y1="56"  x2="256" y2="56"/>
        <line x1="120" y1="88"  x2="256" y2="88"/>
        <line x1="120" y1="120" x2="256" y2="120"/>
        <line x1="120" y1="152" x2="256" y2="152"/>
        <line x1="120" y1="184" x2="256" y2="184"/>
        <line x1="120" y1="216" x2="256" y2="216"/>
      </g>

      <!-- ===== Pencil sketch: house ===== -->
      <g fill="none"
         stroke="#3B342B"
         stroke-width="1.8"
         stroke-linecap="round"
         stroke-linejoin="round">

        <!-- Sun (top-right) -->
        <circle cx="228" cy="60" r="8"/>
        <g stroke-width="1.4">
          <line x1="228" y1="44"  x2="228" y2="50"/>
          <line x1="228" y1="70"  x2="228" y2="76"/>
          <line x1="212" y1="60"  x2="218" y2="60"/>
          <line x1="238" y1="60"  x2="244" y2="60"/>
          <line x1="217" y1="49"  x2="221" y2="53"/>
          <line x1="235" y1="67"  x2="239" y2="71"/>
          <line x1="217" y1="71"  x2="221" y2="67"/>
          <line x1="235" y1="53"  x2="239" y2="49"/>
        </g>

        <!-- Roof (slightly imperfect hand-drawn line) -->
        <path d="M156 142 Q160 138 165 136 L193 102 Q194 101 195 102 L225 142"/>
        <!-- tiny "didn't-quite-match" overshoot on the right eave -->
        <path d="M222 141 L231 143" stroke-width="1.3" stroke-opacity="0.55"/>

        <!-- House body -->
        <path d="M164 142 L164 196 L222 196 L222 142"/>
        <!-- construction/ghost line along the base -->
        <path d="M162 197 L225 197" stroke-width="1" stroke-opacity="0.35"/>

        <!-- Chimney -->
        <path d="M204 118 L204 108 L212 108 L212 125"/>

        <!-- Window (with cross muntins) -->
        <rect x="174" y="156" width="16" height="14"/>
        <line x1="182" y1="156" x2="182" y2="170"/>
        <line x1="174" y1="163" x2="190" y2="163"/>

        <!-- Door -->
        <path d="M200 196 L200 172 L214 172 L214 196"/>
        <!-- Doorknob -->
        <circle cx="211" cy="185" r="1" fill="#3B342B"/>

        <!-- Ground line with slight wobble -->
        <path d="M142 206 Q170 204 198 206 T250 206" stroke-width="1.6"/>

        <!-- Grass tufts -->
        <g stroke-width="1.2">
          <path d="M150 206 l1.5 -4 M152 206 l0 -3 M154 206 l-1.5 -4"/>
          <path d="M232 206 l1.5 -4 M234 206 l0 -3 M236 206 l-1.5 -4"/>
          <path d="M186 206 l1.5 -3 M189 206 l0 -2.5"/>
        </g>

        <!-- Small cloud (top-left of paper area) -->
        <path d="M138 74 q4 -8 12 -6 q3 -6 10 -4 q6 -2 8 4 q4 2 2 6 z" stroke-width="1.3"/>
      </g>

      <!-- Shading: lighter graphite cross-hatch on roof -->
      <g stroke="#6A5F4F" stroke-width="0.6" stroke-opacity="0.45" stroke-linecap="round">
        <line x1="170" y1="136" x2="178" y2="128"/>
        <line x1="175" y1="138" x2="183" y2="130"/>
        <line x1="180" y1="140" x2="188" y2="132"/>
        <line x1="185" y1="140" x2="192" y2="133"/>
      </g>

      <!-- Shading: side wall vertical pencil strokes -->
      <g stroke="#6A5F4F" stroke-width="0.5" stroke-opacity="0.35" stroke-linecap="round">
        <line x1="167" y1="148" x2="167" y2="192"/>
        <line x1="170" y1="152" x2="170" y2="190"/>
      </g>
    </g>

    <!-- ============ Seam: soft shadow (orange piece resting on paper) ============ -->
    <g clip-path="url(#rightClip)">
      <!-- Main soft shadow -->
      <path d="M140 0 L116 256 L132 256 L156 0 Z" fill="url(#seamShadow)"/>
      <!-- Crisp thin edge line -->
      <path d="M140 0 L116 256" stroke="#7A3A10" stroke-opacity="0.35" stroke-width="1"/>
    </g>

    <!-- ============ Subtle inner border ============ -->
    <rect x="1" y="1" width="254" height="254" rx="47" ry="47"
          fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>
  </g>
</svg>
